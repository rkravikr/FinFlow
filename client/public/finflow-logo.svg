<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f43f5e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Midnight Graphite Background, rounded for an app icon feel -->
  <rect width="512" height="512" fill="#1e293b" rx="112" ry="112"/>
  
  <!-- Subtle back node representing data points -->
  <circle cx="160" cy="256" r="16" fill="#rgba(255,255,255,0.1)"/>
  <circle cx="352" cy="256" r="16" fill="#rgba(255,255,255,0.1)"/>

  <!-- The main 'Flow' line representing upward finance trending -->
  <!-- Uses the vibrant gradient and drops a glow -->
  <path 
    d="M 120 340 C 180 340, 200 200, 256 200 C 312 200, 332 300, 392 240" 
    fill="none" 
    stroke="url(#grad1)" 
    stroke-width="48" 
    stroke-linecap="round" 
    filter="url(#glow)"
  />
  
  <!-- An intersecting line representing synchronization and infinity -->
  <path 
    d="M 160 220 C 220 180, 230 320, 280 320 Q 320 320, 380 280" 
    fill="none" 
    stroke="#0ea5e9" 
    stroke-width="24" 
    stroke-linecap="round" 
    opacity="0.8"
  />
</svg>
